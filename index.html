    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        samurai: {
                            bg: '#0A1118', card: '#111A24', gold: '#C5A059', goldHover: '#A37B2C', border: '#1F2937'

    <style>
        body { background-color: #0A1118; color: #E5E7EB; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .font-en { font-family: 'Oswald', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111A24; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #C5A059; }

        .logo-samurai {
            color: #2C5A71;
            text-shadow: -1px -1px 0 #A37B2C, 1px -1px 0 #A37B2C, -1px 1px 0 #A37B2C, 1px 1px 0 #A37B2C, 0 0 6px rgba(163, 123, 44, 0.4);
            letter-spacing: 0.1em;
        }
        .logo-nutrition {
            background: linear-gradient(to bottom, #E5C773, #A37B2C);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            filter: drop-shadow(0 1px 2px rgba(163, 123, 44, 0.5)); letter-spacing: 0.15em;
        }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in-left { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
        .slide-in-left.open { transform: translateX(0); }
        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .card-out-of-stock { opacity: 0.5; filter: grayscale(100%); }
    </style>
</head>

                    <div class="border-t border-samurai-border pt-4 space-y-3">

                        <div class="flex justify-between text-gray-400"><span>التوصيل:</span> <span id="co-delivery" class="font-en text-green-400">+0 DA</span></div>
                        <div class="flex justify-between text-xl font-bold text-white border-t border-samurai-border pt-2"><span>المجموع النهائي:</span> <span id="co-total" class="font-en text-samurai-gold">0 DA</span></div>
                    </div>
                    <button type="submit" class="w-full bg-[#25D366] text-white font-bold py-4 rounded-lg hover:bg-[#128C7E] transition shadow-lg flex justify-center items-center gap-2 text-lg mt-6">
                        <i class="fab fa-whatsapp text-2xl"></i> أرسل الطلب
                    </button>
                </div>
            </form>
        </div>

    <script>
        const CONFIG = {
            whatsapp: "213779186128",
            facebook: "https://www.facebook.com/profile.php?id=100063894531867",
            instagram: "https://www.instagram.com/haidar_samuraijr?igsh=dmRxYzlqaGxmNjB2",
            currency: "DA",
            imgPlaceholder: "https://placehold.co/400x400/111A24/C5A059?text=SAMURAI",
            deliveryHome: 600,
            deliveryDesk: 400,
            googleSheetsAPI: "" 
        };

        const ALGERIA_DATA = [
            { id: 1, name: "01 - أدرار", communes: ["أدرار", "تمنطيط", "رقان"] },
            { id: 2, name: "02 - الشلف", communes: ["الشلف", "تنس", "بوقادير"] },
            { id: 9, name: "09 - البليدة", communes: ["البليدة", "بوفاريك", "موزاية"] },
            { id: 16, name: "16 - الجزائر", communes: ["الجزائر الوسطى", "سيدي امحمد", "رويبة", "الشراقة"] },
            { id: 31, name: "31 - وهران", communes: ["وهران", "بئر الجير", "أرزيو"] }
        ];
        const wilayaNames = ["الأغواط","أم البواقي","باتنة","بجاية","بسكرة","بشار","البويرة","تمنراست","تبسة","تلمسان","تيارت","تيزي وزو","الجلفة","جيجل","سطيف","سعيدة","سكيكدة","سيدي بلعباس","عنابة","قالمة","المدية","مستغانم","المسيلة","معسكر","ورقلة","البيض","إليزي","برج بوعريريج","بومرداس","الطارف","تندوف","تيسمسيلت","الوادي","خنشلة","سوق أهراس","تيبازة","ميلة","عين الدفلى","النعامة","عين تموشنت","غرداية","غليزان","تيميمون","برج باجي مختار","أولاد جلال","بني عباس","إن صالح","إن قزام","تقرت","جانت","المغير","المنيعة"];
        for(let i=1; i<=58; i++) {
            if(!ALGERIA_DATA.find(w => w.id === i)) {
                let wName = wilayaNames.shift() || `ولاية ${i}`;
                let prefix = i < 10 ? `0${i}` : i;
                ALGERIA_DATA.push({ id: i, name: `${prefix} - ${wName}`, communes: [`بلدية ${wName}`] });
            }
        }
        ALGERIA_DATA.sort((a, b) => a.id - b.id);

                let DB = {
            categories: [
                { id: 'packs', name: 'باقات (Packs)', image: 'images/cat-packs.jpg' },
                { id: 'proteins', name: 'بروتينات', image: 'images/cat-proteins.jpg' },
                { id: 'mass_gainers', name: 'ضخامة (Gainers)', image: 'images/cat-gainers.jpg' },
                { id: 'creatines', name: 'كرياتين', image: 'images/cat-creatines.jpg' },
                { id: 'pre_workout', name: 'طاقة (Pre-Workout)', image: 'images/cat-pre.jpg' },
                { id: 'vitamins', name: 'فيتامينات', image: 'images/cat-vitamins.jpg' },
                { id: 'fat_burner', name: 'حوارق الدهون', image: 'images/cat-fatburner.jpg' },
                { id: 'boosters', name: 'محفزات', image: 'images/cat-boosters.jpg' },
                { id: 'collagen', name: 'كولاجين', image: 'images/cat-collagen.jpg' },
                { id: 'amino', name: 'أحماض أمينية', image: 'images/cat-amino.jpg' },
                { id: 'drinks', name: 'مشروبات', image: 'images/cat-drinks.jpg' }
            ],
            subCategories: {
                'proteins': ['Whey Isolate', 'Whey Hydro', 'Whey Concentrate', 'Casein']
            },
            products: [
                { id: 101, catId: 'proteins', subCat: 'Whey Isolate', name: 'Samurai Isolate 100% 2kg', price: 16500, image: 'images/iso.jpg', stock: 'in_stock' },
                { id: 102, catId: 'proteins', subCat: 'Whey Hydro', name: 'Hydrolyzed Gold 1.5kg', price: 18000, image: 'images/hydro.jpg', stock: 'in_stock' },
                { id: 103, catId: 'proteins', subCat: 'Whey Concentrate', name: 'Basic Whey 2kg', price: 12000, image: 'images/whey.jpg', stock: 'out_of_stock' },
                { id: 201, catId: 'creatines', name: 'Creatine Monohydrate 300g', price: 4500, image: 'images/crea.jpg', stock: 'in_stock' },
                { id: 301, catId: 'pre_workout', name: 'Katana Pre-Workout 30 serv', price: 6500, image: 'images/pre.jpg', stock: 'in_stock' },
                { id: 401, catId: 'mass_gainers', name: 'Sumo Mass Gainer 5kg', price: 14000, image: 'images/gainer.jpg', stock: 'in_stock' }
            ]
        };


        const State = {
            cart: JSON.parse(localStorage.getItem('samurai_cart')) || [],
            currentCategory: null,
            filters: { subCat: 'all', price: 'all' }
        };

        const App = {
            init: async () => {
                document.getElementById('year').textContent = new Date().getFullYear();
                document.getElementById('footer-fb').href = CONFIG.facebook;
                document.getElementById('footer-ig').href = CONFIG.instagram;
                document.getElementById('footer-wa').href = `https://wa.me/${CONFIG.whatsapp}`;
                App.updateCartUI();
                await App.fetchDataFromSheets();
                App.renderHome();
                document.addEventListener('click', (e) => {
                    if(!e.target.closest('#search-input') && !e.target.closest('button[onclick="App.toggleSearch()"]')) {
                        document.getElementById('search-input').classList.add('hidden');
                        document.getElementById('search-results').classList.add('hidden');
                    }
                });
            },

            fetchDataFromSheets: async () => {
                if(!CONFIG.googleSheetsAPI) return; 
                try {
                    const res = await fetch(CONFIG.googleSheetsAPI);
                    DB = await res.json();
                } catch (e) { console.log("استخدام البيانات المحلية"); }
            },

            goHome: () => {
                State.currentCategory = null;
                document.getElementById('hero-section').style.display = 'block';
                document.getElementById('nav-controls').classList.add('hidden');
                App.renderHome();
            },

            renderHome: () => {
                const container = document.getElementById('app-container');
                let html = `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">`;
                DB.categories.forEach(cat => {
                    html += `
                    <div onclick="App.openCategory('${cat.id}')" class="relative w-full aspect-square rounded-xl overflow-hidden shadow-lg border border-samurai-border hover:border-samurai-gold transition-all cursor-pointer group fade-in">
                        <img src="${cat.image}" onerror="this.src='${CONFIG.imgPlaceholder}'" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent flex items-end justify-center pb-6">
                            <h3 class="text-xl font-bold text-white group-hover:text-samurai-gold transition">${cat.name}</h3>
                        </div>
                    </div>`;
                });
                container.innerHTML = html + `</div>`;
            },

            openCategory: (catId) => {
                State.currentCategory = catId;
                State.filters = { subCat: 'all', price: 'all' };
                document.getElementById('hero-section').style.display = 'none';
                document.getElementById('nav-controls').classList.remove('hidden');
                
                const category = DB.categories.find(c => c.id === catId);
                const hasSubCats = DB.subCategories && DB.subCategories[catId] && DB.subCategories[catId].length > 0;
                const container = document.getElementById('app-container');

                let html = `
                    <div class="flex flex-col md:flex-row gap-8 fade-in">
                        <aside class="w-full md:w-64 flex-shrink-0">
                            <div class="bg-samurai-card border border-samurai-border rounded-xl p-5 sticky top-28 shadow-sm">
                                <h3 class="text-xl font-bold text-white mb-4 border-b border-samurai-border pb-2"><i class="fas fa-filter text-samurai-gold ml-2"></i> تصفية</h3>
                                ${hasSubCats ? `
                                <div class="mb-6">
                                    <h4 class="text-gray-300 font-bold mb-3 text-sm">الفئات الفرعية</h4>
                                    <div class="space-y-2">
                                        <label class="flex items-center cursor-pointer">
                                            <input type="radio" name="subcat" value="all" checked onchange="App.updateFilter('subCat', 'all')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600">
                                            <span class="mr-2 text-gray-400 text-sm font-en">الكل</span>
                                        </label>
                                        ${DB.subCategories[catId].map(sub => `
                                            <label class="flex items-center cursor-pointer">
                                                <input type="radio" name="subcat" value="${sub}" onchange="App.updateFilter('subCat', '${sub}')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600">
                                                <span class="mr-2 text-gray-400 text-sm font-en">${sub}</span>
                                            </label>
                                        `).join('')}
                                    </div>
                                </div>` : ''}
                                <div>
                                    <h4 class="text-gray-300 font-bold mb-3 text-sm">السعر (${CONFIG.currency})</h4>
                                    <div class="space-y-2">
                                        <label class="flex items-center cursor-pointer"><input type="radio" name="price" value="all" checked onchange="App.updateFilter('price', 'all')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600"><span class="mr-2 text-gray-400 text-sm">الكل</span></label>
                                        <label class="flex items-center cursor-pointer"><input type="radio" name="price" value="0-5000" onchange="App.updateFilter('price', '0-5000')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600"><span class="mr-2 text-gray-400 text-sm font-en">0 - 5,000</span></label>
                                        <label class="flex items-center cursor-pointer"><input type="radio" name="price" value="5000-10000" onchange="App.updateFilter('price', '5000-10000')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600"><span class="mr-2 text-gray-400 text-sm font-en">5,000 - 10,000</span></label>
                                        <label class="flex items-center cursor-pointer"><input type="radio" name="price" value="10000-20000" onchange="App.updateFilter('price', '10000-20000')" class="w-4 h-4 text-samurai-gold bg-samurai-bg border-gray-600"><span class="mr-2 text-gray-400 text-sm font-en">10,000 - 20,000</span></label>
                                    </div>
                                </div>
                            </div>
                        </aside>
                        <div class="flex-grow">
                            <h2 class="text-3xl font-bold text-white mb-6 border-b border-samurai-border pb-3">${category.name}</h2>
                            <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"></div>
                        </div>
                    </div>
                `;
                container.innerHTML = html;
                App.renderProducts();
            },

            updateFilter: (type, value) => {
                State.filters[type] = value;
                App.renderProducts();
            },

            renderProducts: () => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = `<div class="col-span-full h-32 skeleton rounded-xl"></div>`;
                setTimeout(() => {
                    let products = DB.products.filter(p => p.catId === State.currentCategory);
                    if (State.filters.subCat !== 'all') products = products.filter(p => p.subCat === State.filters.subCat);
                    if (State.filters.price !== 'all') {
                        products = products.filter(p => {
                            if (State.filters.price === '0-5000') return p.price <= 5000;
                            if (State.filters.price === '5000-10000') return p.price > 5000 && p.price <= 10000;
                            if (State.filters.price === '10000-20000') return p.price > 10000 && p.price <= 20000;
                            return true;
                        });
                    }
                    if (products.length === 0) {
                        grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">لا توجد منتجات تطابق بحثك.</div>`;
                        return;
                    }
                    grid.innerHTML = products.map(p => {
                        let btn = p.stock === 'in_stock' ? 
                            `<button onclick="App.addToCart(${p.id}, event)" class="w-full bg-samurai-gold text-white font-bold py-2 mt-3 rounded hover:bg-samurai-goldHover transition">أضف للسلة</button>` :
                            `<button disabled class="w-full bg-samurai-border text-gray-500 py-2 mt-3 rounded cursor-not-allowed">نفد</button>`;
                        return `
                        <div class="bg-samurai-card border border-samurai-border rounded-xl p-4 flex flex-col hover:border-samurai-gold/50 cursor-pointer fade-in" onclick="App.openProductModal(${p.id})">
                            <div class="h-40 flex items-center justify-center bg-white/5 rounded-lg mb-4">
                                <img src="${p.image}" onerror="this.src='${CONFIG.imgPlaceholder}'" class="max-h-full object-contain drop-shadow-lg">
                            </div>
                            ${p.subCat ? `<p class="text-samurai-gold text-xs font-bold uppercase mb-1 font-en">${p.subCat}</p>` : ''}
                            <h3 class="text-white font-bold text-sm line-clamp-2 font-en" dir="ltr">${p.name}</h3>
                            <p class="text-samurai-gold font-bold text-lg mt-auto font-en">${p.price.toLocaleString()} ${CONFIG.currency}</p>
                            <div onclick="event.stopPropagation()">${btn}</div>
                        </div>`;
                    }).join('');
                }, 200);
            },

            toggleSearch: () => {
                const inp = document.getElementById('search-input');
                inp.classList.toggle('hidden');
                if(!inp.classList.contains('hidden')) inp.focus();
            },
            
            handleSearch: (q) => {
                const resDiv = document.getElementById('search-results');
                if(q.length < 2) { resDiv.classList.add('hidden'); return; }
                const results = DB.products.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
                if(results.length===0){ resDiv.innerHTML='<div class="p-3 text-gray-500 text-sm">لا نتائج</div>'; }
                else {
                    resDiv.innerHTML = results.map(p => `
                    <div class="p-3 border-b border-samurai-border hover:bg-samurai-bg cursor-pointer flex gap-3" onclick="App.openProductModal(${p.id})">
                        <img src="${p.image}" class="w-10 h-10 object-contain bg-white/5 rounded">
                        <div class="text-sm text-white font-en">${p.name}</div>
                    </div>`).join('');
                }
                resDiv.classList.remove('hidden');
            },

            addToCart: (id, e) => {
                if(e) e.stopPropagation();
                const p = DB.products.find(x => x.id === id);
                if(!p || p.stock !== 'in_stock') return;
                const item = State.cart.find(x => x.id === id);
                if(item) item.qty++; else State.cart.push({...p, qty: 1});
                App.saveCart(); App.updateCartUI();
                const badge = document.getElementById('cart-badge');
                badge.classList.add('scale-150'); setTimeout(() => badge.classList.remove('scale-150'), 200);
            },

            updateQty: (id, d) => {
                const item = State.cart.find(x => x.id === id);
                if(item) {
                    item.qty += d;
                    if(item.qty <= 0) State.cart = State.cart.filter(x => x.id !== id);
                    App.saveCart(); App.updateCartUI();
                    if(document.getElementById('cart-sidebar').classList.contains('open')) App.renderCartItems();
                    if(document.getElementById('checkout-modal').classList.contains('open')) {
                        App.renderCheckoutCart(); if(State.cart.length === 0) App.closeModal('checkout-modal');
                    }
                }
            },

            removeItem: (id) => {
                State.cart = State.cart.filter(i => i.id !== id);
                App.saveCart(); App.updateCartUI();
                if(document.getElementById('checkout-modal').classList.contains('open')) {
                    App.renderCheckoutCart(); if(State.cart.length === 0) App.closeModal('checkout-modal');
                }
            },

            saveCart: () => localStorage.setItem('samurai_cart', JSON.stringify(State.cart)),
            
            updateCartUI: () => {
                const totalItems = State.cart.reduce((s, i) => s + i.qty, 0);
                const totalPrice = State.cart.reduce((s, i) => s + (i.price * i.qty), 0);
                const badge = document.getElementById('cart-badge');
                if(totalItems > 0) { badge.textContent = totalItems; badge.classList.remove('hidden'); }
                else badge.classList.add('hidden');
                document.getElementById('nav-cart-total').textContent = `${totalPrice.toLocaleString()} ${CONFIG.currency}`;
            },

            toggleCart: () => {
                document.getElementById('cart-sidebar').classList.toggle('open');
                App.renderCartItems();
            },

            renderCartItems: () => {
                const container = document.getElementById('cart-items');
                if(State.cart.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 mt-10">سلتك فارغة</div>';
                    document.getElementById('btn-checkout').disabled = true;
                    return;
                }
                document.getElementById('btn-checkout').disabled = false;
                container.innerHTML = State.cart.map(item => `
                    <div class="flex gap-3 bg-samurai-card p-3 rounded-lg border border-samurai-border">
                        <img src="${item.image}" class="w-16 h-16 object-contain bg-white/5 rounded">
                        <div class="flex-grow flex flex-col justify-between">
                            <h4 class="text-white text-sm font-en" dir="ltr">${item.name}</h4>
                            <div class="flex justify-between items-center mt-2">
                                <div class="flex items-center bg-samurai-bg rounded border border-samurai-border" dir="ltr">
                                    <button onclick="App.updateQty(${item.id}, -1)" class="px-2 text-gray-400">-</button>
                                    <span class="px-2 text-white">${item.qty}</span>
                                    <button onclick="App.updateQty(${item.id}, 1)" class="px-2 text-gray-400">+</button>
                                </div>
                                <span class="text-samurai-gold font-en">${(item.price * item.qty).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            openProductModal: (id) => {
                const p = DB.products.find(x => x.id === id);
                if(!p) return;
                document.getElementById('modal-img-container').innerHTML = `<img src="${p.image}" class="max-h-72 object-contain drop-shadow-2xl">`;
                document.getElementById('modal-title').textContent = p.name;
                document.getElementById('modal-subcat').textContent = p.subCat || '';
                document.getElementById('modal-price').textContent = `${p.price.toLocaleString
